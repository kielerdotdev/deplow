# pgBackRest → MinIO (local compose defaults).
# Stanza name must match the project id (hostrig PITR APIs).
# Point the control plane at this file:
#   PGBACKREST_CONFIG=/absolute/path/to/infra/pgbackrest/pgbackrest.conf
#   HOSTRIG_PITR_ENABLED=1

[global]
repo1-type=s3
repo1-s3-endpoint=http://127.0.0.1:59000
repo1-s3-bucket=hostrig-backups
repo1-s3-key=hostrig
repo1-s3-key-secret=hostrigsecret
repo1-s3-region=us-east-1
repo1-path=/pgbackrest
repo1-s3-uri-style=path
repo1-retention-full=7
compress-type=zst
start-fast=y
# MinIO is HTTP in local compose
repo1-storage-verify-tls=n

# Project "test" (slug=test) — dedicated container hostrig-pg-test
[731e293b-c46d-4e03-9573-d0dfb22cd5e5]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=p_test
pg1-database=d_test
