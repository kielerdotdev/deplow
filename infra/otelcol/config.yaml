# OTel Collector for deplow Observe (profile: observe).
# Auth is enforced by the control-plane OTLP gateway before traffic reaches here.
# Gateway injects deplow.project_id into OTLP/JSON bodies; deployed apps also set
# it via OTEL_RESOURCE_ATTRIBUTES. Bridge MVs copy otel_* → spans/logs.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 2s
  resource:
    attributes:
      - key: deplow.collector
        value: observe
        action: upsert

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s&compress=lz4
    username: deplow
    password: deplow
    database: deplow_observe
    ttl: 168h
    timeout: 10s
    create_schema: false
    traces_table_name: otel_spans
    logs_table_name: otel_logs
    metrics_tables:
      gauge:
        name: metrics_gauge
      sum:
        name: metrics_sum
      histogram:
        name: metrics_histogram
      summary:
        name: metrics_summary
      exponential_histogram:
        name: metrics_exp_histogram
    retry_on_failure:
      enabled: true
      initial_interval: 2s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [clickhouse]
  telemetry:
    logs:
      level: info
