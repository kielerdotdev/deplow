# Central platform services for local / self-hosted hostrig (dev & monorepo).
# Production VPS: use deploy/install.sh (pull-only) — see deploy/docker-compose.yml.
# Host ports chosen to avoid common collisions on shared machines.
#
# Object storage is operator-provided (MinIO or Cloudflare R2) — not bundled.
# Set HOSTRIG_S3_* in .env; buckets are created on demand.
#
# User apps join the `default` network (name: hostrig_default) so they can
# resolve dedicated per-project Postgres/Redis containers by Docker DNS.
# The Caddy proxy is the only public HTTP entry for apps; data services stay private.
services:
  # Control-plane Redis for BullMQ (not per-project tenant Redis)
  platform-redis:
    image: redis:7-alpine
    container_name: hostrig-platform-redis
    restart: unless-stopped
    # Dev default password is intentional (override via HOSTRIG_REDIS_PASSWORD).
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${HOSTRIG_REDIS_PASSWORD:-hostrig-dev-redis}",
      ]
    ports:
      - "127.0.0.1:56380:6379"
    volumes:
      - hostrig_platform_redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${HOSTRIG_REDIS_PASSWORD:-hostrig-dev-redis}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # BuildKit daemon for railpack source builds (BUILDKIT_HOST=docker-container://buildkit).
  # Must be --privileged for nested build operations.
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    restart: unless-stopped
    privileged: true
    healthcheck:
      test: ["CMD", "buildctl", "debug", "workers"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Platform reverse proxy: Host {slug}.{baseDomain} → app container.
  # All edges (cloudflared, Tailscale Serve, Netbird) forward here with Host preserved.
  # Compose-network origin: http://caddy:80
  # Host-side origin:       http://127.0.0.1:8088
  caddy:
    image: caddy:2-alpine
    container_name: hostrig-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/hostrig-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # v1 edge: Cloudflare Tunnel on the default compose network (same as caddy).
  # Enable with:
  #   CLOUDFLARE_TUNNEL_TOKEN=... docker compose --profile edge up -d
  # In Cloudflare Zero Trust → your tunnel → Public Hostname:
  #   Hostname: *.apps.example.com
  #   Path:     /
  #   Service:  http://caddy:80
  # DNS: CNAME *.apps.example.com → <tunnel-id>.cfargotunnel.com (proxied).
  # cloudflared reaches Caddy via Docker DNS on the shared default network.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hostrig-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_healthy

  # Control plane (UI + oRPC + deploy workers). Needs Docker socket for user apps.
  # Start with: bash scripts/deploy.sh   (or: docker compose --profile app up -d)
  web:
    profiles: ["app"]
    image: ${HOSTRIG_IMAGE:-ghcr.io/kielerdotdev/hostrig:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hostrig-web
    restart: unless-stopped
    ports:
      - "${HOSTRIG_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /data/hostrig.db
      HOSTRIG_GIT_CLONE_ROOT: /data/git-clones
      HOSTRIG_PROXY_ROUTES_DIR: /etc/caddy/routes
      HOSTRIG_QUEUE_REDIS_URL: redis://:${HOSTRIG_REDIS_PASSWORD:-hostrig-dev-redis}@platform-redis:6379
      HOSTRIG_DOCKER_NETWORK: ${HOSTRIG_DOCKER_NETWORK:-hostrig_default}
      HOSTRIG_CADDY_CONTAINER: hostrig-caddy
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      HOSTRIG_PUBLIC_URL: ${HOSTRIG_PUBLIC_URL:-http://localhost:3000}
      HOSTRIG_BASE_DOMAIN: ${HOSTRIG_BASE_DOMAIN:-apps.localhost}
      HOSTRIG_PUBLIC_URL_PROTOCOL: ${HOSTRIG_PUBLIC_URL_PROTOCOL:-http}
      # User apps always require gVisor — runc is not allowed
      HOSTRIG_APP_RUNTIME: runsc
      HOSTRIG_APP_RUNTIME_REQUIRED: "true"
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://buildkit}
      RAILPACK_BIN: /usr/local/bin/railpack
      # S3: set HOSTRIG_S3_* in .env (not bundled)
    volumes:
      - ./data:/data
      - ./infra/caddy/routes:/etc/caddy/routes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      platform-redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

  # Observe profile: ClickHouse + OTel collector (required when HOSTRIG_OBSERVE_ENABLED=1)
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hostrig-clickhouse
    profiles: ["observe"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: hostrig_observe
      CLICKHOUSE_USER: hostrig
      CLICKHOUSE_PASSWORD: hostrig
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    # Loopback-only in monorepo compose (never publish Observe CH to all interfaces).
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:19000:9000"
    volumes:
      - hostrig_observe_ch:/var/lib/clickhouse
      - ./infra/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: hostrig-otelcol
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    # OTLP only on loopback — apps must use the authenticated control-plane gateway.
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./infra/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  hostrig_platform_redis_data:
  hostrig_observe_ch:
