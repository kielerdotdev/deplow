# Central platform services for local / self-hosted deplow.
# Host ports chosen to avoid common collisions on shared machines.
#
# User apps join the `default` network (name: deplow_default) so they can
# resolve postgres/redis/minio by Docker DNS. The Caddy proxy is the only
# public HTTP entry for apps; Postgres/Redis stay private.
services:
  postgres:
    image: postgres:16-alpine
    container_name: deplow-postgres
    restart: unless-stopped
    # Platform services stay on default runc — never runsc
    environment:
      POSTGRES_USER: deplow
      POSTGRES_PASSWORD: deplow
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      - deplow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deplow -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: deplow-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "deplow", "--appendonly", "yes"]
    ports:
      - "56379:6379"
    volumes:
      - deplow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "deplow", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: deplow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: deplow
      MINIO_ROOT_PASSWORD: deplowsecret
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - deplow_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Sidekick so healthchecks / bucket bootstrap can use mc
  minio-init:
    image: minio/mc:latest
    container_name: deplow-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 deplow deplowsecret; do sleep 1; done;
      mc mb -p local/deplow-backups || true;
      exit 0;
      "

  # Platform reverse proxy: Host {slug}.{baseDomain} → app container.
  # cloudflared (optional profile `edge`) points at this proxy.
  caddy:
    image: caddy:2-alpine
    container_name: deplow-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 3s
      retries: 5

  # v1 edge: Cloudflare Tunnel. Enable with:
  #   CLOUDFLARE_TUNNEL_TOKEN=... docker compose --profile edge up -d
  # Point wildcard DNS (*.apps.example.com) at the tunnel once.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deplow-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - caddy

volumes:
  deplow_pg_data:
  deplow_redis_data:
  deplow_minio_data:
