# Central platform services for local / self-hosted deplow (dev & monorepo).
# Production VPS: use deploy/install.sh (pull-only) — see deploy/docker-compose.yml.
# Host ports chosen to avoid common collisions on shared machines.
#
# Object storage is operator-provided (MinIO or Cloudflare R2) — not bundled.
# Set DEPLOW_S3_* in .env; buckets are created on demand.
#
# User apps join the `default` network (name: deplow_default) so they can
# resolve dedicated per-project Postgres/Redis containers by Docker DNS.
# The Caddy proxy is the only public HTTP entry for apps; data services stay private.
services:
  # Control-plane Redis for BullMQ (not per-project tenant Redis)
  platform-redis:
    image: redis:7-alpine
    container_name: deplow-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "56380:6379"
    volumes:
      - deplow_platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # BuildKit daemon for railpack source builds (BUILDKIT_HOST=docker-container://buildkit).
  # Must be --privileged for nested build operations.
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    restart: unless-stopped
    privileged: true
    healthcheck:
      test: ["CMD", "buildctl", "debug", "workers"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Platform reverse proxy: Host {slug}.{baseDomain} → app container.
  # All edges (cloudflared, Tailscale Serve, Netbird) forward here with Host preserved.
  # Compose-network origin: http://caddy:80
  # Host-side origin:       http://127.0.0.1:8088
  caddy:
    image: caddy:2-alpine
    container_name: deplow-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/deplow-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # v1 edge: Cloudflare Tunnel on the default compose network (same as caddy).
  # Enable with:
  #   CLOUDFLARE_TUNNEL_TOKEN=... docker compose --profile edge up -d
  # In Cloudflare Zero Trust → your tunnel → Public Hostname:
  #   Hostname: *.apps.example.com
  #   Path:     /
  #   Service:  http://caddy:80
  # DNS: CNAME *.apps.example.com → <tunnel-id>.cfargotunnel.com (proxied).
  # cloudflared reaches Caddy via Docker DNS on the shared default network.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deplow-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_healthy

  # Control plane (UI + oRPC + deploy workers). Needs Docker socket for user apps.
  # Start with: bash scripts/deploy.sh   (or: docker compose --profile app up -d)
  web:
    profiles: ["app"]
    image: ${DEPLOW_IMAGE:-ghcr.io/kielerdotdev/deplow:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deplow-web
    restart: unless-stopped
    ports:
      - "${DEPLOW_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /data/deplow.db
      DEPLOW_GIT_CLONE_ROOT: /data/git-clones
      DEPLOW_PROXY_ROUTES_DIR: /etc/caddy/routes
      DEPLOW_QUEUE_REDIS_URL: redis://platform-redis:6379
      DEPLOW_DOCKER_NETWORK: ${DEPLOW_DOCKER_NETWORK:-deplow_default}
      DEPLOW_CADDY_CONTAINER: deplow-caddy
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DEPLOW_PUBLIC_URL: ${DEPLOW_PUBLIC_URL:-http://localhost:3000}
      DEPLOW_BASE_DOMAIN: ${DEPLOW_BASE_DOMAIN:-apps.localhost}
      DEPLOW_PUBLIC_URL_PROTOCOL: ${DEPLOW_PUBLIC_URL_PROTOCOL:-http}
      DEPLOW_APP_RUNTIME: ${DEPLOW_APP_RUNTIME:-runsc}
      DEPLOW_APP_RUNTIME_REQUIRED: ${DEPLOW_APP_RUNTIME_REQUIRED:-true}
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://buildkit}
      RAILPACK_BIN: /usr/local/bin/railpack
      # S3: set DEPLOW_S3_* in .env (not bundled)
    volumes:
      - ./data:/data
      - ./infra/caddy/routes:/etc/caddy/routes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      platform-redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

  # Observe profile: ClickHouse + OTel collector (required when DEPLOW_OBSERVE_ENABLED=1)
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: deplow-clickhouse
    profiles: ["observe"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: deplow_observe
      CLICKHOUSE_USER: deplow
      CLICKHOUSE_PASSWORD: deplow
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      # Avoid clashing with host MinIO :9000 — native protocol stays internal.
      - "19000:9000"
    volumes:
      - deplow_observe_ch:/var/lib/clickhouse
      - ./infra/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: deplow-otelcol
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  deplow_platform_redis_data:
  deplow_observe_ch:
