# Production platform stack — pull-only (no local image build).
# Install via: curl -sSL https://raw.githubusercontent.com/kielerdotdev/deplow/main/deploy/install.sh | sudo bash
#
# Project name must be `deplow` so the default network is `deplow_default`
# (install.sh always passes `-p deplow`).
#
# Object storage: bundled MinIO by default (profile `bundled-s3`).
# Set DEPLOW_BUNDLE_MINIO=0 and point DEPLOW_S3_* at your own MinIO/R2 to skip it.

services:
  platform-redis:
    image: redis:7-alpine
    container_name: deplow-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "56380:6379"
    volumes:
      - deplow_platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: deplow-minio
    restart: unless-stopped
    profiles: ["bundled-s3"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${DEPLOW_S3_ACCESS_KEY:-deplow}
      MINIO_ROOT_PASSWORD: ${DEPLOW_S3_SECRET_KEY:-deplowsecret}
    ports:
      - "${DEPLOW_MINIO_API_PORT:-9000}:9000"
      - "${DEPLOW_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - deplow_minio_data:/data

  caddy:
    image: caddy:2.8-alpine
    container_name: deplow-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - deplow_caddy_routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/deplow-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deplow-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_healthy

  web:
    image: ${DEPLOW_IMAGE:-ghcr.io/kielerdotdev/deplow:latest}
    working_dir: /app/apps/web
    command:
      [
        "pnpm",
        "exec",
        "srvx",
        "--prod",
        "--port",
        "3000",
        "--static",
        "../client",
        "--entry",
        "dist/server/server.js",
      ]
    container_name: deplow-web
    restart: unless-stopped
    ports:
      - "${DEPLOW_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /data/deplow.db
      DEPLOW_GIT_CLONE_ROOT: /data/git-clones
      DEPLOW_PROXY_ROUTES_DIR: /etc/caddy/routes
      DEPLOW_QUEUE_REDIS_URL: redis://platform-redis:6379
      DEPLOW_DOCKER_NETWORK: ${DEPLOW_DOCKER_NETWORK:-deplow_default}
      DEPLOW_CADDY_CONTAINER: deplow-caddy
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DEPLOW_PUBLIC_URL: ${DEPLOW_PUBLIC_URL:-http://localhost:3000}
      DEPLOW_BASE_DOMAIN: ${DEPLOW_BASE_DOMAIN:-apps.localhost}
      DEPLOW_PUBLIC_URL_PROTOCOL: ${DEPLOW_PUBLIC_URL_PROTOCOL:-http}
      DEPLOW_APP_RUNTIME: ${DEPLOW_APP_RUNTIME:-runsc}
      DEPLOW_APP_RUNTIME_REQUIRED: ${DEPLOW_APP_RUNTIME_REQUIRED:-true}
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://buildkit}
      RAILPACK_BIN: /usr/local/bin/railpack
    volumes:
      - deplow_web_data:/data
      - deplow_caddy_routes:/etc/caddy/routes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      platform-redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: deplow-clickhouse
    profiles: ["observe"]
    restart: unless-stopped
    volumes:
      - deplow_observe_ch:/var/lib/clickhouse
      - ../infra/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: deplow-otelcol
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../infra/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  deplow_web_data:
  deplow_caddy_routes:
  deplow_platform_redis_data:
  deplow_minio_data:
  deplow_observe_ch:
