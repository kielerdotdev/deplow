# Production platform stack — pull-only (no local image build).
# Install via: curl -sSL https://raw.githubusercontent.com/kielerdotdev/hostrig/main/deploy/install.sh | sudo bash
#
# Project name must be `hostrig` so the default network is `hostrig_default`
# (install.sh always passes `-p hostrig`).
#
# Object storage: bundled MinIO by default (profile `bundled-s3`).
# Set HOSTRIG_BUNDLE_MINIO=0 and point HOSTRIG_S3_* at your own MinIO/R2 to skip it.

services:
  platform-redis:
    image: redis:7-alpine
    container_name: hostrig-platform-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${HOSTRIG_REDIS_PASSWORD:?set HOSTRIG_REDIS_PASSWORD}",
      ]
    # Loopback only — BullMQ is internal to the compose network.
    ports:
      - "127.0.0.1:56380:6379"
    volumes:
      - hostrig_platform_redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${HOSTRIG_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: hostrig-minio
    restart: unless-stopped
    profiles: ["bundled-s3"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${HOSTRIG_S3_ACCESS_KEY:?set HOSTRIG_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${HOSTRIG_S3_SECRET_KEY:?set HOSTRIG_S3_SECRET_KEY}
    # Loopback only — apps reach MinIO via Docker DNS (minio:9000).
    ports:
      - "127.0.0.1:${HOSTRIG_MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${HOSTRIG_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - hostrig_minio_data:/data

  caddy:
    image: caddy:2.8-alpine
    container_name: hostrig-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - hostrig_caddy_routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/hostrig-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hostrig-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_healthy

  web:
    image: ${HOSTRIG_IMAGE:-ghcr.io/kielerdotdev/hostrig:latest}
    working_dir: /app/apps/web
    command:
      [
        "pnpm",
        "exec",
        "srvx",
        "--prod",
        "--port",
        "3000",
        "--static",
        "../client",
        "--entry",
        "dist/server/server.js",
      ]
    container_name: hostrig-web
    restart: unless-stopped
    ports:
      - "${HOSTRIG_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /data/hostrig.db
      HOSTRIG_GIT_CLONE_ROOT: /data/git-clones
      HOSTRIG_PROXY_ROUTES_DIR: /etc/caddy/routes
      HOSTRIG_QUEUE_REDIS_URL: redis://:${HOSTRIG_REDIS_PASSWORD}@platform-redis:6379
      HOSTRIG_DOCKER_NETWORK: ${HOSTRIG_DOCKER_NETWORK:-hostrig_default}
      HOSTRIG_CADDY_CONTAINER: hostrig-caddy
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      HOSTRIG_PUBLIC_URL: ${HOSTRIG_PUBLIC_URL:-http://localhost:3000}
      HOSTRIG_BASE_DOMAIN: ${HOSTRIG_BASE_DOMAIN:-apps.localhost}
      HOSTRIG_PUBLIC_URL_PROTOCOL: ${HOSTRIG_PUBLIC_URL_PROTOCOL:-http}
      # User apps always require gVisor — do not set HOSTRIG_APP_RUNTIME=runc
      HOSTRIG_APP_RUNTIME: runsc
      HOSTRIG_APP_RUNTIME_REQUIRED: "true"
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://buildkit}
      RAILPACK_BIN: /usr/local/bin/railpack
    volumes:
      - hostrig_web_data:/data
      - hostrig_caddy_routes:/etc/caddy/routes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      platform-redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hostrig-clickhouse
    profiles: ["observe"]
    restart: unless-stopped
    volumes:
      - hostrig_observe_ch:/var/lib/clickhouse
      - ../infra/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: hostrig-otelcol
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../infra/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  hostrig_web_data:
  hostrig_caddy_routes:
  hostrig_platform_redis_data:
  hostrig_minio_data:
  hostrig_observe_ch:
