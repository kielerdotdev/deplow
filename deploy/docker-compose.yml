# Production platform stack — pull-only (no local image build).
# Install via: curl -sSL https://raw.githubusercontent.com/kielerdotdev/deplow/main/deploy/install.sh | bash
#
# Project name must be `deplow` so the default network is `deplow_default`
# (install.sh always passes `-p deplow`).
#
# Object storage is NOT bundled — set DEPLOW_S3_PROVIDER=minio|r2 and credentials
# in .env (your MinIO or Cloudflare R2). Buckets are created on demand.

services:
  platform-redis:
    image: redis:7-alpine
    container_name: deplow-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "56380:6379"
    volumes:
      - deplow_platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2.8-alpine
    container_name: deplow-caddy
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - deplow_caddy_routes:/etc/caddy/routes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/deplow-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deplow-cloudflared
    restart: unless-stopped
    profiles: ["edge"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_healthy

  web:
    image: ${DEPLOW_IMAGE:-ghcr.io/kielerdotdev/deplow:latest}
    container_name: deplow-web
    restart: unless-stopped
    ports:
      - "${DEPLOW_WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /data/deplow.db
      DEPLOW_GIT_CLONE_ROOT: /data/git-clones
      DEPLOW_PROXY_ROUTES_DIR: /etc/caddy/routes
      DEPLOW_QUEUE_REDIS_URL: redis://platform-redis:6379
      DEPLOW_DOCKER_NETWORK: ${DEPLOW_DOCKER_NETWORK:-deplow_default}
      DEPLOW_CADDY_CONTAINER: deplow-caddy
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DEPLOW_PUBLIC_URL: ${DEPLOW_PUBLIC_URL:-http://localhost:3000}
      DEPLOW_BASE_DOMAIN: ${DEPLOW_BASE_DOMAIN:-apps.localhost}
      DEPLOW_PUBLIC_URL_PROTOCOL: ${DEPLOW_PUBLIC_URL_PROTOCOL:-http}
      DEPLOW_APP_RUNTIME: ${DEPLOW_APP_RUNTIME:-runsc}
      DEPLOW_APP_RUNTIME_REQUIRED: ${DEPLOW_APP_RUNTIME_REQUIRED:-true}
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://buildkit}
      RAILPACK_BIN: /usr/local/bin/railpack
      # S3 comes from env_file (.env): DEPLOW_S3_PROVIDER + keys + endpoint / R2 account
    volumes:
      - deplow_web_data:/data
      - deplow_caddy_routes:/etc/caddy/routes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      platform-redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

volumes:
  deplow_web_data:
  deplow_caddy_routes:
  deplow_platform_redis_data:
